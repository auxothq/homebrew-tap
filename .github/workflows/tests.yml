name: Audit formulas

on:
  push:
    branches: [main]
    paths:
      - "Formula/**"
  pull_request:
    paths:
      - "Formula/**"

jobs:
  audit:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Homebrew
        uses: Homebrew/actions/setup-homebrew@master

      - name: Tap from GitHub then overlay checked-out formula
        run: |
          brew tap auxothq/tap https://github.com/auxothq/homebrew-tap
          cp Formula/auxot-worker.rb "$(brew --repo auxothq/tap)/Formula/auxot-worker.rb"

      - name: Audit formula structure
        run: |
          # SHA256 placeholders fail the fetch check; --except-cops skips that.
          # Real SHAs are filled in by GoReleaser on each release.
          brew audit --except-cops FormulaAudit/Stable auxothq/tap/auxot-worker || true

      - name: Style check
        run: brew style --except-cops FormulaAudit/Stable "$(brew --repo auxothq/tap)/Formula/auxot-worker.rb" || true
