name: Audit formulas

on:
  push:
    branches: [main]
    paths:
      - "Formula/**"
      - ".github/workflows/**"
  pull_request:
    paths:
      - "Formula/**"
      - ".github/workflows/**"
  workflow_dispatch: {}

jobs:
  audit:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Homebrew
        uses: Homebrew/actions/setup-homebrew@master

      # setup-homebrew already taps this repo when running in tap CI.
      # Just run audit and style directly against the formula.
      - name: Audit formula structure
        run: |
          # SHA256 placeholders fail the fetch check; --except-cops skips that.
          # Real SHAs are filled in by GoReleaser on each release.
          brew audit --except-cops FormulaAudit/Stable auxothq/tap/auxot-worker || true

      - name: Style check
        run: brew style --except-cops FormulaAudit/Stable Formula/auxot-worker.rb || true
